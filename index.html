<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#262626">
  <title>Viagem Chile 2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ============ HOME ============ -->
  <section class="view view-home active" id="view-home">
    <h1 class="home-title" id="home-title">Viagem <span class="flag-text">Chile</span> 2027</h1>

    <div class="countdown">
      <span class="countdown-label">Faltam</span>
      <span class="countdown-num" id="countdown-num">—</span>
      <span class="countdown-label">dias</span>
      <span class="countdown-sub" id="countdown-sub"></span>
    </div>

    <div class="dest-list" id="dest-list">
      <!-- botões de destino gerados via JS -->
    </div>

    <button class="btn btn-dark btn-levar" onclick="abrirLevar(this)">Oque Levar?</button>
  </section>

  <!-- ============ DESTINO ============ -->
  <section class="view view-destino" id="view-destino">
    <button class="back-btn" onclick="voltarHome()">← Voltar</button>

    <!-- Foto do local + nome -->
    <div class="carousel">
      <div class="carousel-photo loading" id="carousel-photo">
        <div class="slide" id="slide-a"></div>
        <div class="slide" id="slide-b"></div>
        <div class="photo-skeleton" id="photo-skeleton"></div>
      </div>
    </div>

    <h2 class="dest-name" id="dest-name">Destino</h2>
    <p class="dest-date" id="dest-date">Data</p>

    <div class="day-nav">
      <button class="day-arrow" id="arrow-prev" aria-label="Dia anterior">‹</button>
      <div class="day-chips" id="day-chips"></div>
      <button class="day-arrow" id="arrow-next" aria-label="Próximo dia">›</button>
    </div>

    <ul class="atividades" id="atividades"></ul>

    <button class="btn btn-light btn-add" onclick="abrirModal()">+ Adicionar atividade</button>
  </section>

  <!-- ============ O QUE LEVAR ============ -->
  <section class="view view-levar" id="view-levar">
    <button class="back-btn" onclick="voltarHome()">← Voltar</button>
    <h2 class="dest-name">O que Levar?</h2>
    <p class="dest-date">Lista de mala</p>
    <ul class="atividades" id="lista-levar"></ul>
    <button class="btn btn-light btn-add" onclick="abrirModalLevar()">+ Adicionar item</button>
  </section>

  <!-- ============ MODAL ADICIONAR ============ -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3 class="modal-title" id="modal-title">Adicionar atividade</h3>
      <input type="text" class="modal-input" id="modal-input" placeholder="Digite aqui..." autocomplete="off">
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-light" id="modal-save" onclick="salvarModal()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Firebase + app (módulos ES) -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
